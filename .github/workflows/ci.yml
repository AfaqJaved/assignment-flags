name: CI

on:
  push:
    branches: [main]

env:
  BUN_VERSION: 1.3.9

jobs:
  format:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # the repo's own "format" scripts run `prettier --write`, which fixes
      # in place rather than failing — CI needs the read-only check instead
      - name: Check formatting
        run: bun run format-check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # domain must build before api (api imports it as a workspace package) —
      # `bun run build` fans out to both via Nx, which orders this correctly
      - name: Build
        run: bun run build

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # vitest (domain) + jest (api) unit tests, both run against in-memory
      # fakes — no database/Redis needed. The e2e suite (below) is a
      # separate job since it needs real service containers.
      - name: Test
        run: bun run test

  test-e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    # Postgres's official image takes its auth config via env vars, so it
    # can run as a "services:" container — GitHub Actions health-checks it
    # before any step runs. Redis doesn't fit that model here: the stock
    # image needs `--requirepass` on its *command line*, and "services:" has
    # no hook to set that, so Redis is started as a plain container in a step
    # below instead, matching docker/docker-compose.yml's image and password
    # exactly.
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: flags
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d flags"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/flags
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_PASSWORD: password
      ENABLE_API_DOCS: 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # e2e tests import @flags/domain as a workspace package resolved via
      # its dist/ output, same as api's own build — must exist before jest
      # runs, same ordering constraint as the build/test jobs above.
      - name: Build domain
        run: cd packages/domain && bun run build

      - name: Start Redis
        run: |
          docker run -d --name redis -p 6379:6379 redis:8.0.6 redis-server --requirepass password
          for i in $(seq 1 10); do
            docker exec redis redis-cli -a password ping 2>/dev/null | grep -q PONG && exit 0
            sleep 2
          done
          echo "Redis did not become ready in time" >&2
          exit 1

      - name: E2E test
        run: cd packages/api && bun run test:e2e

  docker-publish:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: [format, lint, build, test, test-e2e]
    env:
      AR_HOST: ${{ secrets.GCP_REGION }}-docker.pkg.dev
      IMAGE: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.AR_REPOSITORY }}/flags-api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Google Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.AR_HOST }}
          username: _json_key
          password: ${{ secrets.GCP_SA_KEY }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
